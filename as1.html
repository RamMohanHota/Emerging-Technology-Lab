    <style>
      
      html, body { height: 100%; }
      body {
        margin: 0;
        background-color: #2c1723;
        background-image: radial-gradient(rgba(255,255,255,0.02) 1px, transparent 1px);

      .page-wrap {

      .hero-box { background: linear-gradient(90deg,#071029 0%, #0b3560 48%); color:#fff; border-radius:8px; overflow:hidden; }

      .hero-left h1 { font-size: 2.5rem; font-weight:700; margin-bottom:1rem; }
      .hero-right img { width:100%; height:100%; object-fit:cover; display:block; }
      /* Statistics block: white card with circular icons */
      .stats { background: #fff; border-radius: 12px; box-shadow: 0 10px 30px rgba(2,6,23,0.06); padding: 2.5rem 1rem; }
      .stats .col-md-3 { padding: 1rem; }
      .stats i { display:inline-block; width:76px; height:76px; line-height:76px; border-radius:50%; border:2px solid #d6edf6; color:#0b4f6c; font-size:28px; margin-bottom:12px; }
      .stats h4 { color:#0b4f6c; font-weight:700; margin-top:6px; }
      .stats p { color:#6b7280; margin:0; }
    </style>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
