<!--. In an HTML page display a text “You have clicked the button 0 times.” and a button
with a text “Click”. As many times the button is clicked the count value on the text
should update.-->


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .container{
            height :100px;
            width : 500px;
            background-color: rgb(244, 248, 248);
        }
        </style>
</head>
<body>

    <div class="container">
        <p id="counterText" aria-live="polite">You have clicked the button 0 times.</p>
    </div>

    <button id="clickBtn">Click</button>

    <script>
        const counterText = document.getElementById('counterText');
        const clickBtn = document.getElementById('clickBtn');
        let count = 0;
        clickBtn.addEventListener('click', () => {
            count++;
            counterText.textContent = `You have clicked the button ${count} ${count === 1 ? 'time' : 'times'}.`;
        });
    </script>
    
</body>
</html>
